<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Entry &middot; Paridhi Textile</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="entry.html" class="active">New Entry</a>
    <a href="inventory.html">Inventory</a>
  </nav>

  <header>
    <div class="brand">
      <div>
        <span class="pill">New Entry</span>
        <h1>Record Textile Entry</h1>
        <p>Add raw materials, dispatch for processing, or record received goods.</p>
      </div>
    </div>
  </header>

  <main>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="raw-material">Raw Material</button>
      <button class="tab-btn" data-tab="karigar">Karigar</button>
      <button class="tab-btn" data-tab="dyer">Dyer</button>
      <button class="tab-btn" data-tab="stitch">Stitch</button>
      <button class="tab-btn" data-tab="false">False</button>
      <button class="tab-btn" data-tab="received-entry">Received Entry</button>
    </div>

    <!-- Tab 1: Raw Material -->
    <section class="tab-panel active" data-tab="raw-material">
      <form id="form-raw-material" class="card">
        <h2>Raw Material Entry</h2>
        <p style="color:var(--ash);margin-bottom:16px;">When new textiles arrive from a supplier.</p>
        <div class="form-grid">
          <div class="form-group">
            <label for="rm-date">Date of Arrival</label>
            <input type="date" id="rm-date" required />
          </div>
          <div class="form-group">
          <label for="rm-rate">Rate (INR)</label>
            <input type="number" id="rm-rate" step="0.01" min="0" required placeholder="15000" />  
          </div>
          <div class="form-group">
            <label for="rm-color">Color</label>
            <input type="text" id="rm-color" required placeholder="Maroon" />
          </div>
          <div class="form-group">
            <label for="rm-vendor">Vendor / Supplier</label>
            <input type="text" id="rm-vendor" required placeholder="Sharma Textiles" />
          </div>

          <div class="form-group full-width">
            <label>Material Entries (add one or many)</label>
            <div id="rm-material-rows"></div>
            <button type="button" class="button secondary" id="add-material-row" style="width:max-content;">+ Add Material Type</button>
          </div>

          <div class="form-group full-width">
            <label for="rm-notes">Notes (optional)</label>
            <textarea id="rm-notes" rows="2" placeholder="Any additional details..."></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="button primary">Record Raw Material</button>
          <span id="rm-status"></span>
        </div>
      </form>
    </section>

    <!-- Dispatch tabs (Karigar, Dyer, Stitch, False) — generated by JS -->
    <div id="dispatch-panels"></div>

    <!-- Received Entry -->
    <section class="tab-panel" data-tab="received-entry">
      <form id="form-received-entry" class="card">
        <h2>Received Entry</h2>
        <p style="color:var(--ash);margin-bottom:16px;">Record processed goods that came back.</p>
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="pd-select">Select Dispatch Batch</label>
            <select id="pd-select" required>
              <option value="">Loading...</option>
            </select>
          </div>
          <div id="pd-detail-card" class="detail-preview full-width" style="display:none;"></div>
          <div class="form-group">
            <label for="re-date">Received Date</label>
            <input type="date" id="re-date" required />
          </div>
          <div class="form-group">
            <label>Output Type</label>
            <div class="radio-group">
              <label><input type="radio" name="output-type" value="pieces" checked /> Pieces</label>
              <label><input type="radio" name="output-type" value="length" /> Length</label>
            </div>
          </div>
          <div class="form-group">
            <label for="re-quantity">Quantity</label>
            <input type="number" id="re-quantity" step="0.01" min="0.01" required placeholder="50" />
          </div>
          <div class="form-group" id="re-unit-group">
            <label for="re-unit">Unit (e.g. kurtas, dupattas)</label>
            <input type="text" id="re-unit" placeholder="kurtas" />
          </div>
          <div class="form-group full-width">
            <label for="re-description">Description</label>
            <input type="text" id="re-description" required placeholder="Dyed maroon mulmul fabric" />
          </div>
          <div class="form-group full-width">
            <label for="re-notes">Notes (optional)</label>
            <textarea id="re-notes" rows="2"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="button primary">Record Received Goods</button>
          <span id="re-status"></span>
        </div>
      </form>
    </section>
    <!-- Print view (hidden, shown only during print) -->
    <section id="print-dispatch-view" class="print-only"></section>
  </main>

  <footer>Paridhi Textile &middot; Textile Management System</footer>
  <script type="module" src="js/entry.js"></script>
</body>
</html>
